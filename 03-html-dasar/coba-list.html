<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List HTML</title>
  </head>
  <body>
    <h2>Ordered List / Daftar terurut</h2>
    <ol type="A">
      <!-- type="1 (Default)" type="A" / type="a" / type="I" / type="i" -->
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
      <li>Item 4</li>
      <li>Item 5</li>
    </ol>
    <br />
    <h2>Unordered List / Daftar tidak terurut</h2>
    <ul type="square">
      <!-- type="disc (Default)" type="circle" / type="square" -->
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
      <li>Item 4</li>
      <li>Item 5</li>
    </ul>
    <br />
    <h2>Description List / Daftar deskripsi</h2>
    <dl>
      <dt>HTML</dt>
      <dd>HyperText Markup Language</dd>
      <dt>CSS</dt>
      <dd>Cascading Style Sheets</dd>
    </dl>
  </body>
</html>
