<!-- <!DOCTYPE html> -->
<!-- Tag pembuka untuk dokumen HTML -->
<!-- Digunakan sebagai perintah agar browser menggunakan standar mode  -->
<!-- Jika dihilangkan, maka browser akan menggunakan quirks mode  -->

<!-- Quirks Mode -->
<!-- Mode browser yang sengaja melanggar spesifikasi web demi menjaga kompatibilitas halaman web lama ( 90-an ) -->
<!-- Prilaku mode ini sekarang sudah diseragamkan antar browser modern. -->
<!-- Jangan gunakan mode ini untuk membuahalaman baru, gunakan standars mode -->

<!-- 
  <html lang="en">
  </html>

  * Element root untuk dokumen HTML
  * Membungkus seluruh konten halaman web (induk dari <head> dan <body>) selain doctype
  * Diperlukan untuk mendeklarasikan bahasa utama pada dokumen.
  * lang="en" Mendefiniskan bahasa utama dokumen pada tag <html> menggunakan kode ISO (en, en-US, en-GB, id, ja ).
  * Membantu seacrh reader, search engine, dan layanan translasi memahami konten.
  * Dapat digunakan pada elemen spesifik untuk menandai perbedaaan bahasa di dalam konten.
-->

<!-- 
<head>
  ..
</head>

Berisi semua metadata untuk halaman website ( data di belakang layar). 
-->

<!-- 
<body>
  ..
</body>
-->
<!-- Berisi semua bagian yang terlihat di halaman web. -->

<!doctype html>

<html>
  <head>
    <title>WPU Course</title>
    <body style="background-color: lightblue">
      <h1>Hello World!</h1>
    </body>
  </head>
</html>
