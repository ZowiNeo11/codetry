<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Try 2</title>
</head>
<body>
  <h1>Contoh element element form padaH HTML</h1>

  <form>
    <!-- <label for="nama">Nama: </label>
    <input name="nama" id="nama" placeholder="Masukan Nama"> -->
    <label for="nama">Nama: 
      <input name="nama" id="nama" placeholder="Masukan Nama">
    </label>
    <br>
    <label for="password">Password: 
      <input type="password" name="password" id="password" placeholder="Masukan Password">
    </label>
    <br>
    <label for="email">Email: 
      <input type="email" name="email" id="email" placeholder="Masukan Email">
    </label>
    <br>
    <label for="angka">Masukan angka: 
      <input type="number" name="angka" id="angka" placeholder="Masukan Angka" min="1" max="100" step="4">
    </label>
    <br>
    <label for="tanggal">Masukan Tanggal: 
      <input type="date" name="tanggal" id="tanggal">
    </label>
    <br>
    <label for="warna">Masukan Warna: 
      <input type="color" name="warna" id="warna">    
    </label>
    <br>
    <button type="submit">Kirim</button>
  </form>
</body>
</html>
