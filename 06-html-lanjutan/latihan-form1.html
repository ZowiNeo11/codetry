<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Try 1</title>
</head>
<body>
  <form action="">
    <!-- element form -->
    <!-- method = menggunakan apa -->
    <!-- method ada 2 GET & POST. Untuk GET method nya terkirim di URL , kalau POST dikirim di belakang layar -->
    <!-- action = mau mengarah kemana -->

    <!-- ELement form -->
    <!-- input, textarea, select, button, label -->
   
    <input type="">
    <!-- type = text, password, email, url, number, tel, date, file, radio, checkbox -->

    <!-- example label & input -->
    <lable for="text">Input type: text</lable>
    <input type="text" name="text" id="text" placeholder="Input type text"> 

    <label for="password">Input type: password</label>
    <input type="password" name="password" id="password" placeholder="Input type password">

    <!-- example label, checkbox & radio -->
    <input type="checkbox" name="hobi1" id="checkbox1" value="membaca">
    <label for="checkbox1">Membaca</label>
    <input type="checkbox" id="checkbox2" name="hobi2" value="olahraga">
    <label for="checkbox2">Olahraga</label>
    <input type="checkbox" id="checkbox3" name="hobi3" value="musik">
    <label for="checkbox3">Musik</label>

    <input type="radio" id="radio1" name="jenis_kelamin" value="laki-laki">
    <label for="radio1">Laki-laki</label>
    <input type="radio" id="radio2" name="jenis_kelamin" value="perempuan">
    <label for="radio2">Perempuan</label>
  </form>
</body>
</html>
